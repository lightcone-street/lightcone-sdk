name: Release

on:
    push:
        branches: [prod]
    workflow_dispatch:

concurrency:
    group: release
    cancel-in-progress: false

permissions:
    contents: write

env:
    LIGHTCONE_ENV: prod

jobs:
    # ── Test phase (3 parallel jobs) ──

    test-rust:
        name: Test Rust Examples
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: rust
        steps:
            - uses: actions/checkout@v4

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@stable

            - name: Cache cargo
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cargo/registry
                      ~/.cargo/git
                      rust/target
                  key: rust-${{ hashFiles('rust/Cargo.lock') }}
                  restore-keys: rust-

            - name: Write wallet keypair
              env:
                  CI_WALLET_KEYPAIR: ${{ secrets.CI_WALLET_KEYPAIR }}
              run: echo "$CI_WALLET_KEYPAIR" > "$RUNNER_TEMP/ci-wallet.json"

            - name: Set wallet path
              run: echo "LIGHTCONE_WALLET_PATH=$RUNNER_TEMP/ci-wallet.json" >> "$GITHUB_ENV"

            # - name: Install cargo-cooldown
            #   run: cargo install --locked --version 0.2.0 cargo-cooldown

            # - name: Check dependency cooldown
            #   run: cargo cooldown check

            - name: Run all examples
              run: |
                  for file in examples/*.rs; do
                    name=$(basename "$file" .rs)
                    case "$name" in
                      admin_*)
                        echo "::group::$name (skipped — requires admin keypair)"
                        echo "::endgroup::"
                        continue
                        ;;
                      faucet_claim)
                        echo "::group::$name (skipped)"
                        echo "::endgroup::"
                        continue
                        ;;
                    esac
                    echo "::group::$name"
                    timeout 120 cargo run --example "$name" --features native
                    echo "::endgroup::"
                  done

    test-typescript:
        name: Test TypeScript Examples
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: typescript
        steps:
            - uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm
                  cache-dependency-path: typescript/package-lock.json

            - run: npm install

            - name: Write wallet keypair
              env:
                  CI_WALLET_KEYPAIR: ${{ secrets.CI_WALLET_KEYPAIR_TS }}
              run: echo "$CI_WALLET_KEYPAIR" > "$RUNNER_TEMP/ci-wallet.json"

            - name: Set wallet path
              run: echo "LIGHTCONE_WALLET_PATH=$RUNNER_TEMP/ci-wallet.json" >> "$GITHUB_ENV"

            - name: Run all examples
              run: |
                  for file in examples/*.ts; do
                    name=$(basename "$file" .ts)
                    if [ "$name" = "common" ]; then continue; fi
                    case "$name" in
                      admin_*)
                        echo "::group::$name (skipped — requires admin keypair)"
                        echo "::endgroup::"
                        continue
                        ;;
                      faucet_claim)
                        echo "::group::$name (skipped)"
                        echo "::endgroup::"
                        continue
                        ;;
                    esac
                    echo "::group::$name"
                    timeout 120 npx tsx "$file"
                    echo "::endgroup::"
                  done

    test-python:
        name: Test Python Examples
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: python
        steps:
            - uses: actions/checkout@v4

            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.12"

            - name: Install dependencies
              run: pip install -e ".[dev]"

            - name: Write wallet keypair
              env:
                  CI_WALLET_KEYPAIR: ${{ secrets.CI_WALLET_KEYPAIR_PYTHON }}
              run: echo "$CI_WALLET_KEYPAIR" > "$RUNNER_TEMP/ci-wallet.json"

            - name: Set wallet path
              run: echo "LIGHTCONE_WALLET_PATH=$RUNNER_TEMP/ci-wallet.json" >> "$GITHUB_ENV"

            - name: Run all examples
              run: |
                  for file in examples/*.py; do
                    name=$(basename "$file" .py)
                    if [ "$name" = "common" ]; then continue; fi
                    case "$name" in
                      admin_*)
                        echo "::group::$name (skipped — requires admin keypair)"
                        echo "::endgroup::"
                        continue
                        ;;
                      faucet_claim)
                        echo "::group::$name (skipped)"
                        echo "::endgroup::"
                        continue
                        ;;
                    esac
                    echo "::group::$name"
                    timeout 120 python "$file"
                    echo "::endgroup::"
                  done

    # ── Bump versions ──

    bump-versions:
        name: Bump Patch Versions
        needs: [test-rust, test-typescript, test-python]
        runs-on: ubuntu-latest
        outputs:
            rust-version: ${{ steps.bump.outputs.rust_version }}
            ts-version: ${{ steps.bump.outputs.ts_version }}
            python-version: ${{ steps.bump.outputs.python_version }}
        steps:
            - uses: actions/checkout@v4
              with:
                  ref: prod
                  fetch-depth: 0
                  token: ${{ secrets.LIGHTCONE_SDK_GH_CI }}

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@stable

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22

            - name: Bump versions
              id: bump
              run: |
                  chmod +x .github/scripts/bump-versions.sh
                  .github/scripts/bump-versions.sh

            - name: Commit and push version bumps
              env:
                  RUST_VERSION: ${{ steps.bump.outputs.rust_version }}
                  TS_VERSION: ${{ steps.bump.outputs.ts_version }}
                  PYTHON_VERSION: ${{ steps.bump.outputs.python_version }}
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add rust/Cargo.toml rust/Cargo.lock typescript/package.json typescript/package-lock.json python/pyproject.toml
                  git commit -m "chore: bump versions to rust=$RUST_VERSION ts=$TS_VERSION python=$PYTHON_VERSION [skip ci]"
                  git push origin prod

    # ── Publish phase (2 parallel jobs) ──

    publish-rust:
        name: Publish Rust Crate
        needs: [bump-versions]
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: rust
        steps:
            - uses: actions/checkout@v4
              with:
                  ref: prod

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@stable

            - name: Publish to crates.io
              env:
                  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
              run: cargo publish --no-verify

    publish-typescript:
        name: Publish TypeScript Package
        needs: [bump-versions]
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: typescript
        steps:
            - uses: actions/checkout@v4
              with:
                  ref: prod

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  registry-url: https://registry.npmjs.org

            - run: npm install

            - name: Publish to npm
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
              run: npm publish --access public

    # ── Merge version bumps back to staging ──

    sync-staging:
        name: Merge Back to Staging
        needs: [publish-rust, publish-typescript]
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  ref: staging
                  fetch-depth: 0
                  token: ${{ secrets.LIGHTCONE_SDK_GH_CI }}

            - name: Merge prod into staging
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git fetch origin prod
                  git merge origin/prod -m "chore: merge prod version bumps back to staging [skip ci]"
                  git push origin staging
